apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-appset
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  source:
    repoURL: https://github.com/iliesbenyahia/spiderman.git
    targetRevision: HEAD
    path: appsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
    - Prune=false
