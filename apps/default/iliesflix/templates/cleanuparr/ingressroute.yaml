{{- if .Values.cleanuparr.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cleanuparr
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - {{ .Values.ingress.entrypoint }}
  routes:
    - match: "Host(`{{ .Values.cleanuparr.host }}`)"
      kind: Rule
      services:
        - name: cleanuparr
          port: 11011
  tls:
    secretName: iliesflix-tls
{{- end }}
