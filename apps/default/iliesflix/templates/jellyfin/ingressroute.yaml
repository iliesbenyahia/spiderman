{{- if .Values.jellyfin.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - {{ .Values.ingress.entrypoint }}
  routes:
    - match: "Host(`{{ .Values.jellyfin.host }}`)"
      kind: Rule
      services:
        - name: jellyfin
          port: 8096
  tls:
    secretName: iliesflix-tls
{{- end }}
