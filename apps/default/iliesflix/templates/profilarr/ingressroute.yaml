{{- if .Values.profilarr.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: profilarr
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - {{ .Values.ingress.entrypoint }}
  routes:
    - match: "Host(`{{ .Values.profilarr.host }}`)"
      kind: Rule
      services:
        - name: profilarr
          port: 6868
{{- end }}