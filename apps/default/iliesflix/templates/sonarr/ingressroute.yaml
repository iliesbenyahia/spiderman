{{- if .Values.sonarr.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - {{ .Values.ingress.entrypoint }}
  routes:
    - match: "Host(`{{ .Values.sonarr.host }}`)"
      kind: Rule
      services:
        - name: sonarr
          port: 8989
  tls:
    secretName: iliesflix-tls
{{- end }}
