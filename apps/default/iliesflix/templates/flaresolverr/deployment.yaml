{{- if .Values.flaresolverr.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: {{ .Release.Namespace }}
  labels:
    app: flaresolverr
    app.kubernetes.io/part-of: iliesflix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaresolverr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - {{ .Values.flaresolverr.nodeRole | default "iliesflix" | quote }}
      containers:
        - name: flaresolverr
          image: {{ .Values.flaresolverr.image }}
          env:
            - name: LOG_LEVEL
              value: "debug"
            - name: LOG_HTML
              value: "true"
            - name: CAPTCHA_SOLVER
              value: "none"
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
          ports:
            - containerPort: 8191
          livenessProbe:
            httpGet:
              path: /health
              port: 8191
            initialDelaySeconds: 20
            periodSeconds: 30
          resources: {{- toYaml .Values.flaresolverr.resources | nindent 12 }}
{{- end }}
