{{- if .Values.maintainerr.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: maintainerr
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - {{ .Values.ingress.entrypoint }}
  routes:
    - match: "Host(`{{ .Values.maintainerr.host }}`)"
      kind: Rule
      services:
        - name: maintainerr
          port: 8096
  tls:
    secretName: iliesflix-tls
{{- end }}
