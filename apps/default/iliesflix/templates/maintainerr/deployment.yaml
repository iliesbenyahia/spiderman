{{- if .Values.maintainerr.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintainerr
  namespace: {{ .Release.Namespace }}
  labels:
    app: maintainerr
    app.kubernetes.io/part-of: iliesflix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maintainerr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: maintainerr
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - {{ .Values.maintainerr.nodeRole | default "iliesflix" | quote }}
      containers:
        - name: maintainerr
          image: {{ .Values.maintainerr.image }}
          env:
            - name: PUID
              value: {{ .Values.global.puid | quote }}
            - name: PGID
              value: {{ .Values.global.pgid | quote }}
            - name: UMASK
              value: {{ .Values.global.umask | quote }}
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
          ports:
            - containerPort: 6246
          livenessProbe:
            httpGet:
              path: /maintainerr/ping
              port: 6246
            initialDelaySeconds: 30
            periodSeconds: 30
          resources: {{- toYaml .Values.maintainerr.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /opt/data
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: maintainerr-config
{{- end }}
