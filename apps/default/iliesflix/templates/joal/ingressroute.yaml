{{- if .Values.joal.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: joal
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - {{ .Values.ingress.entrypoint }}
  routes:
    - match: "Host(`{{ .Values.joal.host }}`)"
      kind: Rule
      services:
        - name: joal
          port: 8080
{{- end }}
