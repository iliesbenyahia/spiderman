{{- if .Values.joal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: joal
  namespace: joal
  labels:
    app: joal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: joal
  strategy:
    type: Recreate   # évite les conflits d'accès au volume ReadWriteOnce
  template:
    metadata:
      labels:
        app: joal
    spec:
      initContainers:
        - name: bootstrap-conf
          image: alpine:3.20
          command:
            - "sh"
            - "-c"
            - |
              set -e
              if [ -f /data/config.json ]; then
                echo "config.json déjà présent, on ne touche à rien."
                exit 0
              fi
              apk add --no-cache curl tar jq >/dev/null
              echo "Récupération de la dernière release JOAL..."
              URL=$(curl -s https://api.github.com/repos/anthonyraymond/joal/releases/latest \
                | jq -r '.assets[] | select(.name | test("\\.tar\\.gz$")) | .browser_download_url' \
                | head -n1)
              if [ -z "$URL" ]; then
                echo "Impossible de trouver l'asset tar.gz de la dernière release." >&2
                exit 1
              fi
              echo "Téléchargement: $URL"
              curl -sL "$URL" -o /tmp/joal-conf.tar.gz
              mkdir -p /tmp/extracted
              tar xzf /tmp/joal-conf.tar.gz -C /tmp/extracted
              cp -rv /tmp/extracted/* /data/
              echo "Bootstrap terminé."
          volumeMounts:
            - name: conf
              mountPath: /data
      containers:
        - name: joal
          image: anthonyraymond/joal:2.1.37   # adapte la version au besoin
          args:
            - "--joal-conf=/data"
            - "--spring.main.web-environment=true"
            - "--server.port=8080"
            - "--joal.ui.path.prefix=$(UI_PATH_PREFIX)"
            - "--joal.ui.secret-token=$(UI_SECRET_TOKEN)"
          env:
            - name: UI_PATH_PREFIX
              valueFrom:
                secretKeyRef:
                  name: joal-secret
                  key: UI_PATH_PREFIX
            - name: UI_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: joal-secret
                  key: UI_SECRET_TOKEN
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: conf
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: conf
          persistentVolumeClaim:
            claimName: joal-config
{{- end }}
