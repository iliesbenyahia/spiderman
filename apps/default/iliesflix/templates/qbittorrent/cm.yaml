apiVersion: v1
kind: ConfigMap
metadata:
  name: gluetun-scripts
  namespace: {{ .Release.Namespace }}
data:
  port-update.sh: |
    #!/bin/sh
    wget -q -O /dev/null \
      --header "Referer: http://localhost:8080" \
      --post-data "json={\"listen_port\":{{"{{"}}PORTS_0{{"}}"}}}"\
      "http://localhost:8080/api/v2/app/setPreferences" || true