# templates/qbittorrent/pvc.yaml
{{- if .Values.qbittorrent.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.config.storageClass }}
  resources:
    requests:
      storage: {{ .Values.qbittorrent.configSize }}
{{- end }}