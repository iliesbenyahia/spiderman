apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbittorrent-wireguard-conf
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  data:
  - secretKey: wg0.conf
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: "qbittorrent-wireguard-conf"
      metadataPolicy: None