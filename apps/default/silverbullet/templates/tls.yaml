apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: silverbullet-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: silverbullet-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "*.ibenyahia.fr"
  tls:
    secretName: silverbullet-tls