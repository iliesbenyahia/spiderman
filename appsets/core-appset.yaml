apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core
  namespace: argocd
spec:
  project: core
  syncPolicy:
    applicationsSync: create-update
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      repoURL: https://github.com/iliesbenyahia/spiderman
      revision: HEAD
      directories:
      - path: apps/core/*
  template:
    metadata:
      name: '{{.path.basename}}'
    spec:
      project: core
      source:
        repoURL: https://github.com/iliesbenyahia/spiderman.git
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - Prune=false